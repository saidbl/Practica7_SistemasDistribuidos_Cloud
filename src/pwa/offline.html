<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .box {
      max-width: 500px;
      background: #121a2b;
      border: 1px solid #24324b;
      border-radius: 14px;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sin conexión</h1>
    <p>No se pudo acceder a la red. La aplicación mostrará datos en caché si están disponibles.</p>
  </div>
</body>
</html>
